<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <title>Welcome to Russia</title>
    <style>
        body {
            /* Using Flexbox to stack everything in the center */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Start from top but centered */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: rgb(46, 46, 46); /* Russian Blue */
            color: green;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin: 10px 0;
        }

        video{
            border: 4px solid green;
            border-radius: 10px;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 90%; /* Responsive for small screens */
        }

        .gif-container {
            border: 4px solid green;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .back-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #d52b1e; /* Russian Red */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: white;
            color: #d52b1e;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <img src="gifs/soviet.gif" width="200" alt="Soviet Era GIF">

    <h1>Privet, bratan <span id="nameDisplay"></span></h1>

    <video src="video/moscow.mp4" autoplay width="600"></video>

    <div class="gif-container">
        <img src="gifs/drive.gif" width="250" alt="Driving GIF">
        <img src="gifs/putin.gif" width="250" alt="Walking GIF">
    </div>

    <button class="back-btn" onclick="location.href='form.html'">Back to Base</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name');
        document.getElementById('nameDisplay').innerText = userName || "Bratan";
    </script>
</body>
</html>
