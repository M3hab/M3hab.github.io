<!DOCTYPE html>

<head>
    <title>Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <style>
        
.google-sans-code {
  font-family: "Google Sans Code", monospace;
  font-optical-sizing: auto;
  font-weight: 700;
  font-style: normal;
}
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url(pics/background.jpg);
        }
        .text-field{
            border: none;
            border-radius: 5px;
            padding: 3px;
            color: rgb(1, 131, 1);
            background-color: rgb(68, 68, 68);
        }
        fieldset{
            text-align: center;
            color: rgb(1, 131, 1);
            background-color: rgb(46, 46, 46);
            width: 200px;
            height: auto;
            padding: 15px;
            border: 2px solid;
            border-radius: 10px;
        }
        legend{
            padding: 3px;
            border-radius: 5px;
            width: auto;
            color: aliceblue;
            background-color: rgb(1, 131, 1);
        }
        input[type="submit"],
        input[type="reset"] {
            padding: 5px 5px;
            background-color: rgb(1, 131, 1);
            color: aliceblue;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: rgb(0, 104, 0);
            color: aliceblue;
        }
    </style>
</head>
<body class="google-sans-code">
    <form id="mainForm" action="" >
    <fieldset>
        <legend>JOIN US</legend>
            Ur Name ?? <br><input id="userNameInput" class="text-field" type="text" placeholder="Ur name plz" name="name" required><hr>
            <fieldset>
                <legend>Where did u grow up?</legend>
                Egypt &nbsp;&nbsp;<span class="fi fi-eg"></span><input name="country" value="eg" type="radio" required><br>
                Russia &nbsp;<span class="fi fi-ru"></span><input name="country" value="ru" type="radio" required><br>
                Israel &nbsp;<span class="fi fi-il"></span><input name="country" value="noplace" type="radio" required><br>
            </fieldset><hr>
                <input type="submit" value="Confirm">
                <input type="reset" value="Reset">
    </fieldset>
    </form>

    <script>
    const form = document.getElementById('mainForm');
    
    form.addEventListener('submit', function(event) {
        // 1. Get the name
        const name = document.getElementById('userNameInput').value;
        
        // 2. Find the checked radio button
        const selectedCountry = document.querySelector('input[name="country"]:checked');
        
        if (selectedCountry) {
            // 3. Change the action URL based on the radio value
            // This will send the name as a "URL parameter" so the next page can read it
            form.action = selectedCountry.value + ".html?name=" + encodeURIComponent(name);
        } else {
            event.preventDefault();
            alert("Please select a country!");
        }
    });
   </script>
</body>
</html>
