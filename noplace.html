<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <title>ERROR</title>
    <style>
        body {
            background-image: url('desert.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            position: relative; 
            overflow: hidden;
            text-align: center; /* Ensures text is centered inside the div */
        }

        /* This container holds both lines of text */
        .error-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px 50px;
            border-radius: 15px;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0; /* Adds a little space between the two h1 tags */
        }

        .corner-gif {
            position: absolute;
            bottom: 0px;
            left: 20px;
            width: 300px;  
            height: auto; 
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1><span style="color: red;">Error 404</span></h1>
        <hr style="border: 1px solid white;">
        <h1>Country not found</h1>
    </div>
    
    <img src="lost.gif" class="corner-gif">

</body>
</html>
