<!DOCTYPE html>
<html lang="ar">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <title>Welcome to Egypt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: "Lalezar", sans-serif;
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
            margin: 0;
            background-color: #1a1a1a; 
            color: white;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 3rem;
        }

        video {
            border: 5px solid rgb(1, 131, 1);
            border-radius: 15px;
            max-width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .back-btn {
            margin-top: 30px;
            padding: 10px 30px;
            background-color: rgb(1, 131, 1);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: "Lalezar", sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: white;
            color: rgb(1, 131, 1);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1><span id="nameDisplay"></span> اخويا السندال</h1>
    
    <video src="egypt.mp4" autoplay width="600"></video>

    <button class="back-btn" onclick="goBack()">ارجع تاني</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name');
        document.getElementById('nameDisplay').innerText = userName || "العميل المجول";

        function goBack() {
            window.location.href = "form.html"; 
        }
    </script>
</body>
</html>
